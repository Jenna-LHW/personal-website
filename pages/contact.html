<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact · Jenna Li Hoi Wah</title>
  <meta name="description" content="Get in touch with Jenna Li Hoi Wah." />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/contact.css" />
</head>
<body>

  <!-- ── Navbar ───────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="nav-logo" aria-label="Home">
        <img src="../assets/logo.png" alt="Jenna LHW Logo">
      </a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
      </ul>
      <a href="contact.html" class="nav-cta">Contact</a>
    </div>
  </nav>

  <!-- ── Page ─────────────────────────────────────────────── -->
  <main class="page-wrapper">
    <div class="container">

      <!-- Hero -->
      <section class="contact-hero">
        <div class="section-label">Get in touch</div>
        <h1>Let's Talk</h1>
        <p>Whether it's an opportunity, a question, or just a hello — my inbox is always open.</p>
      </section>

      <!-- Two-column grid -->
      <div class="contact-grid">

        <!-- ── LEFT: Contact links ───────────────────────── -->
        <div class="contact-links-section" id="contact-links">
          <!-- Populated by contact.js -->
        </div>

        <!-- ── RIGHT: Contact form ───────────────────────── -->
        <div class="contact-form-card">
          <form id="contact-form" novalidate>

            <div class="form-row">
              <div class="form-group">
                <label for="f-name">Your Name</label>
                <input
                  type="text"
                  id="f-name"
                  name="name"
                  placeholder="Jane Smith"
                  autocomplete="name"
                />
              </div>
              <div class="form-group">
                <label for="f-email">Email Address</label>
                <input
                  type="email"
                  id="f-email"
                  name="email"
                  placeholder="jane@company.com"
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="f-subject">Subject</label>
              <input
                type="text"
                id="f-subject"
                name="subject"
                placeholder="Internship opportunity at …"
              />
            </div>

            <div class="form-group">
              <label for="f-message">Message</label>
              <textarea
                id="f-message"
                name="message"
                placeholder="Hi Jenna, I'd like to discuss…"
              ></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
              <span id="btn-text">Send Message →</span>
            </button>

          </form>
        </div>

      </div><!-- /contact-grid -->
    </div><!-- /container -->
  </main>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text"><span>@Jenna LHW</span> &nbsp;|&nbsp; Built with passion</p>
    </div>
  </footer>

  <!-- ── Toast ────────────────────────────────────────────── -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="../js/supabase-client.js"></script>
  <script src="../js/contact.js"></script>

</body>
</html>
