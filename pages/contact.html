<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact · Jenna Li Hoi Wah</title>
  <meta name="description" content="Get in touch with Jenna Li Hoi Wah." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/contact.css" />
</head>
<body>
  <main class="page-wrapper">

    <!-- Navy hero (full-bleed) -->
    <section class="contact-hero">
      <div class="section-label">Get in touch</div>
      <h1>Let's Talk</h1>
      <p>Whether it's an opportunity, a question, or just a hello — my inbox is always open.</p>
    </section>

    <div class="container">

      <!-- Two-column grid -->
      <div class="contact-grid">

        <!-- ── LEFT: Contact links + avatar ─────────────── -->
        <div class="contact-left-col">
          <div class="contact-links-section" id="contact-links">
            <!-- Populated by contact.js -->
          </div>

        </div>

        <!-- ── RIGHT: Contact form ───────────────────────── -->
        <div class="contact-form-card">
          <form id="contact-form" novalidate>

            <div class="form-row">
              <div class="form-group">
                <label for="f-name">Your Name</label>
                <input type="text" id="f-name" name="name" placeholder="Jane Smith" autocomplete="name" />
              </div>
              <div class="form-group">
                <label for="f-email">Email Address</label>
                <input type="email" id="f-email" name="email" placeholder="jane@company.com" autocomplete="email" />
              </div>
            </div>

            <div class="form-group">
              <label for="f-subject">Subject</label>
              <input type="text" id="f-subject" name="subject" placeholder="Internship opportunity at …" />
            </div>

            <div class="form-group">
              <label for="f-message">Message</label>
              <textarea id="f-message" name="message" placeholder="Hi Jenna, I'd like to discuss…"></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
              <span id="btn-text">Send Message →</span>
            </button>

          </form>
        </div>

      </div><!-- /contact-grid -->
    </div><!-- /container -->
  </main>

  <!-- ── Toast ────────────────────────────────────────────── -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script src="../js/components.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/contact.js"></script>

</body>
</html>
