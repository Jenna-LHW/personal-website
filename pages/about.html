<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me · Jenna Li Hoi Wah</title>
  <meta name="description" content="About Jenna Li Hoi Wah — Computer Science student, developer, and builder." />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/about.css" />
</head>
<body>

  <!-- ── Navbar ───────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="nav-logo" aria-label="Home"><img src="../assets/logo.png" alt="Jenna LHW Logo"></a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="about.html" class="active">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
      <a href="contact.html" class="nav-cta">Contact</a>
    </div>
  </nav>

  <!-- ── Page ─────────────────────────────────────────────── -->
  <main class="page-wrapper">

    <!-- Navy hero (full-bleed) -->
    <section class="about-hero-section">
      <div class="container">
        <div class="about-hero-inner">
          <div>
            <div class="about-hero-tag">About Me</div>
            <h1>Jenna Li Hoi Wah</h1>
            <p class="hero-sub">CS Student · Aspiring Full-Stack Developer · Data Analytics Enthusiast</p>
          </div>
          <div class="about-hero-avatar">
            <div class="profile-avatar-circle">JL</div>
          </div>
        </div>
      </div>
    </section>

    <div class="container">

      <!-- Bio — full width -->
      <div class="about-bio-row">
        <section class="bio-section" aria-labelledby="bio-heading">
          <div class="section-label" id="bio-heading">About Me</div>
          <div id="bio-content">
            <!-- Populated by about.js -->
          </div>
        </section>
      </div>

      <!-- Two-column grid: edu+exp left, skills right -->
      <div class="about-grid">

        <!-- ── LEFT COLUMN ──────────────────────────────── -->
        <div class="about-left">

          <!-- Education -->
          <section class="edu-section" aria-labelledby="edu-heading">
            <div class="section-label" id="edu-heading">Education</div>
            <div id="edu-list">
              <!-- Populated by about.js -->
            </div>
          </section>

          <!-- Experience -->
          <section class="exp-section" aria-labelledby="exp-heading">
            <div class="section-label" id="exp-heading">Experience</div>
            <div class="exp-timeline" id="exp-list">
              <!-- Populated by about.js -->
            </div>
          </section>

        </div><!-- /about-left -->

        <!-- ── RIGHT COLUMN: Skills + Avatar ────────────── -->
        <div class="skills-col">
          <aside class="skills-section" aria-labelledby="skills-heading">
            <div class="section-label" id="skills-heading">Skills</div>
            <div id="skills-content">
              <!-- Populated by about.js -->
            </div>
          </aside>

        </div>

      </div><!-- /about-grid -->

    </div><!-- /container -->
  </main>

  <!-- ── Footer ───────────────────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text"><span>Jenna Li Hoi Wah</span></p>
      <p class="footer-right">© 2025 · Built with passion</p>
    </div>
  </footer>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/about.js"></script>
